name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | docker login --username AWS --password-stdin 509463546267.dkr.ecr.eu-north-1.amazonaws.com

      - name: Build Docker image
        run: docker build -t url-shortener .

      - name: Tag Docker image
        run: docker tag url-shortener:latest 509463546267.dkr.ecr.eu-north-1.amazonaws.com/url-shortener:latest

      - name: Push Docker image
        run: docker push 509463546267.dkr.ecr.eu-north-1.amazonaws.com/url-shortener:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull 509463546267.dkr.ecr.eu-north-1.amazonaws.com/url-shortener:latest
            sudo docker stop url-shortener || true
            sudo docker rm url-shortener || true
            sudo docker run -d -p 80:3000 --name url-shortener \
            509463546267.dkr.ecr.eu-north-1.amazonaws.com/url-shortener:latest