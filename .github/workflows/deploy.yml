name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region eu-north-1 \
          | docker login --username AWS --password-stdin 509463546267.dkr.ecr.eu-north-1.amazonaws.com

      - name: Build Image
        run: docker build -t url-shortener .

      - name: Push Image
        run: |
          docker tag url-shortener:latest 509463546267.dkr.ecr.eu-north-1.amazonaws.com/url-shortener:latest
          docker push 509463546267.dkr.ecr.eu-north-1.amazonaws.com/url-shortener:latest